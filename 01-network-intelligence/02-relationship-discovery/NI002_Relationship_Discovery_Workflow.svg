<svg width="1400" height="700" xmlns="http://www.w3.org/2000/svg">

<style>
.title { font: bold 28px Arial; fill:#1f2937; }
.subtitle { font: 16px Arial; fill:#4b5563; }
.box { fill:#f8fafc; stroke:#64748b; stroke-width:2; rx:10; }
.stage { fill:#eef2ff; stroke:#4f46e5; stroke-width:2; rx:10; }
.output { fill:#ecfdf5; stroke:#16a34a; stroke-width:2; rx:10; }
.downstream { fill:#fff7ed; stroke:#ea580c; stroke-width:2; rx:10; }
.text { font: 14px Arial; fill:#111827; }
.small { font: 12px Arial; fill:#374151; }
.arrow { stroke:#475569; stroke-width:3; fill:none; marker-end:url(#arrow); }
</style>

<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
<path d="M0,0 L10,3 L0,6 Z" fill="#475569"/>
</marker>
</defs>

<text x="40" y="50" class="title">NI002 – Relationship Discovery Intelligence Pattern</text>
<text x="40" y="80" class="subtitle">Transforming trusted entities into connected intelligence networks</text>

<!-- Stage 1 -->
<rect x="40" y="180" width="220" height="120" class="stage"/>
<text x="70" y="220" class="text">Stage 1</text>
<text x="70" y="250" class="text">Trusted Entity</text>
<text x="70" y="275" class="text">Population</text>

<!-- Stage 2 -->
<rect x="330" y="140" width="260" height="220" class="stage"/>
<text x="360" y="180" class="text">Stage 2</text>
<text x="360" y="210" class="text">Relationship Identification</text>

<text x="360" y="250" class="small">• Ownership</text>
<text x="360" y="275" class="small">• Contact</text>
<text x="360" y="300" class="small">• Financial</text>
<text x="360" y="325" class="small">• Behavioural</text>

<!-- Stage 3 -->
<rect x="660" y="180" width="220" height="120" class="stage"/>
<text x="700" y="220" class="text">Stage 3</text>
<text x="700" y="250" class="text">Relationship</text>
<text x="700" y="275" class="text">Scoring</text>

<!-- Stage 4 -->
<rect x="950" y="180" width="220" height="120" class="stage"/>
<text x="985" y="220" class="text">Stage 4</text>
<text x="985" y="250" class="text">Network</text>
<text x="985" y="275" class="text">Construction</text>

<!-- Output -->
<rect x="1240" y="140" width="130" height="200" class="output"/>
<text x="1260" y="180" class="text">Output</text>

<text x="1255" y="220" class="small">Network Graph</text>
<text x="1255" y="245" class="small">Connected Entities</text>
<text x="1255" y="270" class="small">Network Clusters</text>
<text x="1255" y="295" class="small">Investigation Leads</text>

<!-- Arrows -->
<line x1="260" y1="240" x2="330" y2="240" class="arrow"/>
<line x1="590" y1="240" x2="660" y2="240" class="arrow"/>
<line x1="880" y1="240" x2="950" y2="240" class="arrow"/>
<line x1="1170" y1="240" x2="1240" y2="240" class="arrow"/>

<!-- Downstream -->
<text x="40" y="450" class="title">Downstream Intelligence Consumers</text>

<rect x="40" y="500" width="250" height="80" class="downstream"/>
<text x="65" y="545" class="text">NI003 Beneficial Ownership</text>

<rect x="340" y="500" width="250" height="80" class="downstream"/>
<text x="370" y="545" class="text">NI004 Network Risk</text>

<rect x="640" y="500" width="250" height="80" class="downstream"/>
<text x="675" y="545" class="text">NI005 Investigation Workflow</text>

<rect x="940" y="500" width="300" height="80" class="downstream"/>
<text x="980" y="545" class="text">NI006 AI Investigator Copilot</text>

</svg>
